<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg1: #08111f;
            --bg2: #101c35;
            --panel: rgba(18, 28, 49, 0.88);
            --border: rgba(126, 154, 206, 0.18);
            --text: #ecf5ff;
            --muted: #95a8c4;
            --accent: #5f90ff;
            --accent2: #8d7cff;
            --success: #64d89a;
            --warning: #f4c56a;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(95,144,255,0.18), transparent 28%),
                radial-gradient(circle at bottom center, rgba(141,124,255,0.16), transparent 24%),
                linear-gradient(135deg, var(--bg1), #0a1325 46%, #121c37 100%);
            min-height: 100vh;
        }

        .container {
            width: min(1200px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0 40px;
        }

        .hero, .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.22);
        }

        .hero {
            padding: 28px;
            margin-bottom: 22px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: 34px;
        }

        .hero p {
            color: var(--muted);
            margin: 0;
            max-width: 700px;
        }

        .badge {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 18px;
        }

        .metric {
            grid-column: span 3;
            padding: 20px;
        }

        .metric .label {
            color: var(--muted);
            font-size: 13px;
        }

        .metric .value {
            font-size: 30px;
            font-weight: 700;
            margin-top: 10px;
        }

        .wide {
            grid-column: span 8;
            padding: 22px;
        }

        .side {
            grid-column: span 4;
            padding: 22px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 13px;
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            font-size: 12px;
        }

        .status-new { color: #9cc2ff; }
        .status-contacted { color: #7be0ff; }
        .status-qualified { color: var(--warning); }
        .status-proposal { color: #d1a2ff; }
        .status-won { color: var(--success); }
        .status-lost { color: #ff9d9d; }

        input, select {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            margin-bottom: 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 950px) {
            .metric, .wide, .side {
                grid-column: span 12;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function getStatusClass(status) {
            const map = {
                "New": "status-new",
                "Contacted": "status-contacted",
                "Qualified": "status-qualified",
                "Proposal Sent": "status-proposal",
                "Closed Won": "status-won",
                "Closed Lost": "status-lost",
            };
            return map[status] || "";
        }

        function App() {
            const [leads, setLeads] = useState([]);
            const [dashboard, setDashboard] = useState({
                totalLeads: 0,
                newLeads: 0,
                contactedLeads: 0,
                closedLeads: 0,
            });
            const [form, setForm] = useState({
                full_name: "",
                company: "",
                email: "",
                phone: "",
                status: "New",
                source: "",
            });
            const [message, setMessage] = useState("");

            async function loadData() {
                const leadsRes = await fetch("/api/leads");
                const leadsData = await leadsRes.json();
                setLeads(leadsData);

                const dashRes = await fetch("/api/dashboard");
                const dashData = await dashRes.json();
                setDashboard(dashData);
            }

            useEffect(() => {
                loadData();
            }, []);

            async function submitLead(e) {
                e.preventDefault();
                setMessage("");

                const res = await fetch("/api/leads", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(form),
                });

                const data = await res.json();
                if (!res.ok) {
                    setMessage(data.error || "Failed to add lead");
                    return;
                }

                setForm({
                    full_name: "",
                    company: "",
                    email: "",
                    phone: "",
                    status: "New",
                    source: "",
                });
                setMessage("Lead added successfully.");
                loadData();
            }

            async function updateStatus(id, status) {
                await fetch(`/api/leads/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status }),
                });
                loadData();
            }

            return (
                <div className="container">
                    <div className="hero">
                        <div className="badge">CRM · Python · SQL · React</div>
                        <h1>Customer Relationship Management Platform</h1>
                        <p>
                            A CRM platform for sales leads. Track prospects, manage lead status,
                            and give your team a simple sales workflow.
                        </p>
                    </div>

                    <div className="grid">
                        <div className="card metric">
                            <div className="label">Total Leads</div>
                            <div className="value">{dashboard.totalLeads}</div>
                        </div>
                        <div className="card metric">
                            <div className="label">New Leads</div>
                            <div className="value">{dashboard.newLeads}</div>
                        </div>
                        <div className="card metric">
                            <div className="label">Contacted</div>
                            <div className="value">{dashboard.contactedLeads}</div>
                        </div>
                        <div className="card metric">
                            <div className="label">Closed Won</div>
                            <div className="value">{dashboard.closedLeads}</div>
                        </div>

                        <div className="card wide">
                            <h2>Lead Pipeline</h2>
                            <p className="muted">Update the lead stage directly from the table.</p>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Company</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Source</th>
                                        <th>Status</th>
                                        <th>Change Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {leads.map((lead) => (
                                        <tr key={lead.id}>
                                            <td>{lead.full_name}</td>
                                            <td>{lead.company}</td>
                                            <td>{lead.email}</td>
                                            <td>{lead.phone}</td>
                                            <td>{lead.source}</td>
                                            <td>
                                                <span className={`status ${getStatusClass(lead.status)}`}>
                                                    {lead.status}
                                                </span>
                                            </td>
                                            <td>
                                                <select
                                                    value={lead.status}
                                                    onChange={(e) => updateStatus(lead.id, e.target.value)}
                                                >
                                                    <option>New</option>
                                                    <option>Contacted</option>
                                                    <option>Qualified</option>
                                                    <option>Proposal Sent</option>
                                                    <option>Closed Won</option>
                                                    <option>Closed Lost</option>
                                                </select>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div className="card side">
                            <h2>Add Lead</h2>
                            <p className="muted">Create a new sales lead for the CRM pipeline.</p>

                            <form onSubmit={submitLead}>
                                <input
                                    placeholder="Full name"
                                    value={form.full_name}
                                    onChange={(e) => setForm({ ...form, full_name: e.target.value })}
                                />
                                <input
                                    placeholder="Company"
                                    value={form.company}
                                    onChange={(e) => setForm({ ...form, company: e.target.value })}
                                />
                                <input
                                    placeholder="Email"
                                    type="email"
                                    value={form.email}
                                    onChange={(e) => setForm({ ...form, email: e.target.value })}
                                />
                                <input
                                    placeholder="Phone"
                                    value={form.phone}
                                    onChange={(e) => setForm({ ...form, phone: e.target.value })}
                                />
                                <input
                                    placeholder="Source"
                                    value={form.source}
                                    onChange={(e) => setForm({ ...form, source: e.target.value })}
                                />
                                <select
                                    value={form.status}
                                    onChange={(e) => setForm({ ...form, status: e.target.value })}
                                >
                                    <option>New</option>
                                    <option>Contacted</option>
                                    <option>Qualified</option>
                                    <option>Proposal Sent</option>
                                    <option>Closed Won</option>
                                    <option>Closed Lost</option>
                                </select>
                                <button type="submit">Save Lead</button>
                            </form>

                            {message && <p style={{ marginTop: "12px" }}>{message}</p>}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
